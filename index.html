<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Angola Marble Race Premium</title>
    <style>
        body { background: #0a142d; color: white; font-family: Arial; text-align: center; margin: 0; overflow: hidden; }
        canvas { background: #0a142d; border-bottom: 5px solid #00e664; display: block; margin: 0 auto; }
        #ui { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(10,20,45,0.9); padding: 20px; border-radius: 15px; border: 2px solid #ffd700; width: 350px; }
        button { background: #0070ba; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:hover { background: #005ea6; }
        .bet-btn { background: #ffd700; color: #0a142d; margin-top: 20px; }
        input { width: 90%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        #status { color: #00e664; font-weight: bold; margin: 10px 0; }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="ui">
        <h2 id="title">MARBLE RACE 🇦🇴</h2>
        <div id="login-section">
            <p>Identifica-te para o PayPal:</p>
            <input type="text" id="username" placeholder="Teu Nome ou E-mail">
            <button onclick="confirmarLogin()">Entrar no Jogo</button>
        </div>

        <div id="menu-section" style="display:none;">
            <p id="player-welcome"></p>
            <p id="status">Saldo: $0.00</p>
            <button onclick="pagarPayPal()">PAGAR $3 COM PAYPAL</button>
            <div id="bet-options" style="display:none;">
                <button class="bet-btn" onclick="começarCorrida('Angola')">APOSTAR EM ANGOLA 🇦🇴</button>
                <button class="bet-btn" style="background:white;" onclick="começarCorrida('Brasil')">APOSTAR NO BRASIL 🇧🇷</button>
            </div>
        </div>

        <div id="result-section" style="display:none;">
            <h1 id="winner-text"></h1>
            <p id="prize-text"></p>
            <button onclick="reiniciar()">VOLTAR AO MENU</button>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let estado = "UI";
    let saldo = 0;
    let usuario = "";
    let apostaEm = "";
    let vencedor = "";
    let marbles = [];
    const paises = [
        {nome: "Angola", cor: "#FF0000", emoji: "🇦🇴"},
        {nome: "Brasil", cor: "#009739", emoji: "🇧🇷"},
        {nome: "Portugal", cor: "#FF0000", emoji: "🇵🇹"},
        {nome: "EUA", cor: "#002868", emoji: "🇺🇸"},
        {nome: "Nigéria", cor: "#008751", emoji: "🇳🇬"}
    ];

    function confirmarLogin() {
        usuario = document.getElementById('username').value;
        if(usuario.length > 2) {
            document.getElementById('login-section').style.display = "none";
            document.getElementById('menu-section').style.display = "block";
            document.getElementById('player-welcome').innerText = "Jogador: " + usuario;
        }
    }

    function pagarPayPal() {
        // Abre o teu link do PayPal
        window.open("https://www.paypal.me/antoniocecilia223/3usd", "_blank");
        // Simula o saldo para o jogo continuar
        saldo = 3;
        document.getElementById('status').innerText = "Saldo: $3.00 (Confirmado)";
        document.getElementById('bet-options').style.display = "block";
    }

    function começarCorrida(pais) {
        apostaEm = pais;
        saldo -= 3;
        marbles = paises.map((p, i) => ({
            ...p,
            x: (canvas.width / (paises.length + 1)) * (i + 1),
            y: -100 - (Math.random() * 500),
            velY: 0,
            finished: false
        }));
        estado = "CORRIDA";
        document.getElementById('ui').style.display = "none";
        animar();
    }

    function animar() {
        if (estado !== "CORRIDA") return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Linha de Chegada
        ctx.strokeStyle = "#00e664";
        ctx.lineWidth = 5;
        ctx.beginPath();
        ctx.moveTo(0, canvas.height - 100);
        ctx.lineTo(canvas.width, canvas.height - 100);
        ctx.stroke();

        let todosFinalizados = true;

        marbles.forEach(m => {
            if (!m.finished) {
                m.velY += 0.15 + (Math.random() * 0.1); // JUSTO PARA TODOS
                m.y += m.velY;
                m.x += (Math.random() - 0.5) * 2;

                if (m.y >= canvas.height - 100) {
                    m.y = canvas.height - 100;
                    m.finished = true;
                    if (vencedor === "") vencedor = m.nome;
                }
                todosFinalizados = false;
            }

            // Desenhar Berlinde
            ctx.fillStyle = m.cor;
            ctx.beginPath();
            ctx.arc(m.x, m.y, 20, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = "white";
            ctx.font = "14px Arial";
            ctx.fillText(m.emoji + " " + m.nome, m.x - 25, m.y - 30);
        });

        if (todosFinalizados) {
            finalizarJogo();
        } else {
            requestAnimationFrame(animar);
        }
    }

    function finalizarJogo() {
        estado = "UI";
        document.getElementById('ui').style.display = "block";
        document.getElementById('menu-section').style.display = "none";
        document.getElementById('result-section').style.display = "block";
        document.getElementById('winner-text').innerText = "VENCEDOR: " + vencedor;
        
        if (vencedor === apostaEm) {
            document.getElementById('prize-text').innerHTML = "<span style='color:#00e664'>GANHASTE $30!</span><br>António enviará para o teu PayPal.";
        } else {
            document.getElementById('prize-text').innerText = "PERDESTE A APOSTA.";
        }
    }

    function reiniciar() {
        vencedor = "";
        document.getElementById('result-section').style.display = "none";
        document.getElementById('menu-section').style.display = "block";
        document.getElementById('status').innerText = "Saldo: $0.00";
        document.getElementById('bet-options').style.display = "none";
    }
</script>
</body>
</html>
